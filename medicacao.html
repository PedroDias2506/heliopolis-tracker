<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicação — Heliópolis PA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
:root{--blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-600:#185FA5;--blue-800:#0C447C;--blue-900:#042C53;--teal-50:#E1F5EE;--teal-600:#0F6E56;--teal-800:#085041;--coral-50:#FAECE7;--coral-600:#993C1D;--coral-800:#712B13;--gray-50:#F1EFE8;--gray-100:#D3D1C7;--gray-600:#5F5E5A;--gray-800:#444441;--gray-900:#2C2C2A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:#f4f6f9;min-height:100vh;color:var(--gray-900);}
nav{background:var(--blue-900);padding:0 2rem;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.18);}
.nav-brand{font-size:15px;font-weight:600;color:#fff;letter-spacing:.03em;}
.nav-brand span{color:var(--blue-100);font-weight:400;}
.screen{padding:2rem;max-width:680px;margin:0 auto;}
.card{background:#fff;border-radius:12px;border:.5px solid #dde1e7;padding:1.5rem;margin-bottom:1.25rem;}
.card-title{font-size:13px;font-weight:600;color:var(--gray-600);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1.1rem;}
label{display:block;font-size:13px;font-weight:500;color:var(--gray-600);margin-bottom:6px;margin-top:14px;}
label:first-of-type{margin-top:0;}
input[type="number"],input[type="text"]{width:100%;height:42px;border:1px solid #dde1e7;border-radius:8px;padding:0 14px;font-family:inherit;font-size:15px;color:var(--gray-900);background:#fafafa;outline:none;transition:border-color .15s;}
input:focus{border-color:var(--blue-600);box-shadow:0 0 0 3px rgba(24,95,165,.12);background:#fff;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 1.4rem;height:42px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--blue-600);color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-outline{background:none;border:1px solid #dde1e7;color:var(--gray-600);font-size:13px;height:36px;padding:0 1rem;}
.btn-outline:hover{background:var(--gray-50);}
.btn-full{width:100%;}
.step-header{text-align:center;padding:1.5rem 0 1rem;}
.step-badge{display:inline-flex;align-items:center;gap:8px;border-radius:100px;padding:6px 16px;font-size:14px;font-weight:500;margin-bottom:12px;}
.step-title{font-size:24px;font-weight:600;color:var(--gray-900);margin-bottom:4px;}
.step-subtitle{font-size:14px;color:var(--gray-600);}
.scanner-area{position:relative;width:100%;max-width:320px;margin:0 auto;background:#000;border-radius:12px;overflow:hidden;}
.scanner-area video{width:100%;display:block;min-height:240px;object-fit:cover;}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.scan-frame{width:200px;height:200px;border:2px solid rgba(255,255,255,.8);border-radius:12px;position:relative;}
.scan-frame::before{content:'';position:absolute;top:-2px;left:-2px;width:30px;height:30px;border-top:3px solid #5CB3F0;border-left:3px solid #5CB3F0;border-radius:4px 0 0 0;}
.scan-frame::after{content:'';position:absolute;bottom:-2px;right:-2px;width:30px;height:30px;border-bottom:3px solid #5CB3F0;border-right:3px solid #5CB3F0;border-radius:0 0 4px 0;}
.scan-line{position:absolute;width:180px;height:2px;background:linear-gradient(90deg,transparent,#5CB3F0,transparent);animation:scanLine 2s ease-in-out infinite;}
@keyframes scanLine{0%{top:10px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:190px;opacity:0}}
.or-divider{display:flex;align-items:center;gap:12px;margin:1.25rem 0;color:var(--gray-600);font-size:13px;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:.5px;background:#dde1e7;}
.feedback-box{display:none;border-radius:10px;padding:1.25rem 1.5rem;margin-top:1.25rem;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feedback-box.success{background:var(--teal-50);border:1px solid #9FE1CB;}
.feedback-box.error{background:var(--coral-50);border:1px solid #F5C4B3;}
.feedback-title{font-size:16px;font-weight:600;margin-bottom:4px;}
.feedback-box.success .feedback-title{color:var(--teal-800);}
.feedback-box.error .feedback-title{color:var(--coral-600);}
.feedback-detail{font-size:13px;}
.feedback-box.success .feedback-detail{color:var(--teal-600);}
.feedback-box.error .feedback-detail{color:var(--coral-600);}
.paciente-lido{background:var(--blue-50);border:1px solid var(--blue-100);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;display:none;}
.pl-pront{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--blue-800);}
.pl-nome{font-size:15px;color:var(--gray-800);margin-top:2px;}
.btn-ini{background:#854F0B;color:#fff;width:100%;height:52px;font-size:15px;border-radius:10px;margin-top:1rem;border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:opacity .15s;}
.btn-fim{background:#185FA5;color:#fff;width:100%;height:52px;font-size:15px;border-radius:10px;margin-top:.75rem;border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:opacity .15s;display:none;}
.btn-ini:hover,.btn-fim:hover{opacity:.88;}
@media(max-width:500px){nav{padding:0 1rem;}.screen{padding:1rem;}}
</style>
</head>
<body>
<nav><div class="nav-brand">Heliópolis <span>/ Medicação</span></div></nav>
<div class="screen">
  <div class="step-header">
    <div class="step-badge" style="background:#FAEEDA;color:#633806;">
      <span style="width:8px;height:8px;border-radius:50%;background:#854F0B;display:inline-block;"></span>
      Posto de registro
    </div>
    <div class="step-title">Medicação</div>
    <div class="step-subtitle">Registre o início e o fim da etapa</div>
  </div>
  <div class="card">
    <div class="card-title">Leitura de QR Code</div>
    <div class="scanner-area">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-overlay"><div class="scan-frame"><div class="scan-line"></div></div></div>
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:1rem;" onclick="ativarScanner()">Ativar câmera</button>
    <button class="btn btn-outline btn-full" style="margin-top:8px;" onclick="pararScanner()">Parar câmera</button>
  </div>
  <div class="or-divider">ou digitar manualmente</div>
  <div class="card">
    <label for="m-pront">Número do prontuário</label>
    <input type="number" id="m-pront" placeholder="Ex: 1234567" maxlength="7" oninput="this.value=this.value.slice(0,7)">
    <label for="m-nome">Nome do paciente</label>
    <input type="text" id="m-nome" placeholder="Ex: Maria Silva">
    <div id="paciente-lido" class="paciente-lido">
      <div class="pl-pront" id="pl-pront"></div>
      <div class="pl-nome" id="pl-nome"></div>
    </div>
    <button class="btn-ini" onclick="registrarInicio()">▶ Registrar Medicação Início</button>
    <button class="btn-fim" id="btn-fim" onclick="registrarFim()">⏹ Registrar Medicação Fim</button>
  </div>
  <div class="feedback-box" id="fb">
    <div class="feedback-title" id="fb-title"></div>
    <div class="feedback-detail" id="fb-detail"></div>
  </div>
</div>
<script>
const ETAPA_INI='Medicação Início', ETAPA_FIM='Medicação Fim';
let dadosQR=null, inicioRegistrado=false;
function getScriptUrl(){try{return localStorage.getItem('scriptUrl')||'';}catch(e){return '';}}
function formatarDataHora(d){const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),aa=d.getFullYear(),h=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0'),ss=String(d.getSeconds()).padStart(2,'0');return`${dd}/${mm}/${aa} ${h}:${mi}:${ss}`;}
function registrarEtapa(prontuario,nome,etapa,cb){const url=getScriptUrl(),dataHora=formatarDataHora(new Date());if(!url){if(cb)cb(false,'URL não configurada');return;}fetch(url+'?'+new URLSearchParams({prontuario,nome,etapa,dataHora}),{method:'GET',mode:'no-cors'}).then(()=>{if(cb)cb(true,dataHora);}).catch(e=>{if(cb)cb(false,String(e));});}
function mostrarFeedback(tipo,titulo,detalhe){const fb=document.getElementById('fb');fb.className='feedback-box '+tipo;document.getElementById('fb-title').textContent=titulo;document.getElementById('fb-detail').textContent=detalhe;fb.style.display='block';fb.scrollIntoView({behavior:'smooth',block:'nearest'});}
function esconder(ms){setTimeout(()=>{document.getElementById('fb').style.display='none';},ms||7000);}
let zxingReader=null,scannerAtivo=false;
async function ativarScanner(){
  if(scannerAtivo)return;
  if(!window.ZXing){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);}).catch(()=>{mostrarFeedback('error','Erro','Falha ao carregar leitor de QR.');return;});}
  try{const video=document.getElementById('video');zxingReader=new ZXing.BrowserQRCodeReader();scannerAtivo=true;const devices=await ZXing.BrowserCodeReader.listVideoInputDevices();const traseira=devices.find(d=>/back|rear|environment/i.test(d.label))||devices[devices.length-1];await zxingReader.decodeFromVideoDevice(traseira?.deviceId,video,(result)=>{if(result){pararScanner();let data;try{data=JSON.parse(result.getText());}catch(_){data={p:result.getText(),n:'—'};}preencherPaciente(String(data.p),data.n);}}); }catch(e){scannerAtivo=false;mostrarFeedback('error','Câmera indisponível','Verifique as permissões ou use o campo manual abaixo.');}
}
function pararScanner(){if(zxingReader){try{zxingReader.reset();}catch(_){}zxingReader=null;}scannerAtivo=false;}
function preencherPaciente(pront,nome){document.getElementById('m-pront').value=pront;document.getElementById('m-nome').value=nome;dadosQR={p:pront,n:nome};document.getElementById('pl-pront').textContent=pront;document.getElementById('pl-nome').textContent=nome;document.getElementById('paciente-lido').style.display='block';}
function getPaciente(){const pront=dadosQR?dadosQR.p:document.getElementById('m-pront').value.trim();const nome=dadosQR?dadosQR.n:document.getElementById('m-nome').value.trim();if(!pront||isNaN(pront)||Number(pront)<=0){mostrarFeedback('error','Prontuário inválido','Informe um número de prontuário válido.');return null;}if(String(pront).length>7){mostrarFeedback('error','Prontuário inválido','O prontuário deve ter no máximo 7 dígitos.');return null;}if(!nome){mostrarFeedback('error','Nome ausente','Informe o nome do paciente.');return null;}return{pront,nome};}
function registrarInicio(){const p=getPaciente();if(!p)return;registrarEtapa(p.pront,p.nome,ETAPA_INI,(ok,dh)=>{if(ok){mostrarFeedback('success',`Medicação Início — ${dh}`,`Prontuário: ${p.pront} · ${p.nome}`);inicioRegistrado=true;document.getElementById('btn-fim').style.display='block';}else mostrarFeedback('error','Erro ao registrar',dh);esconder(8000);});}
function registrarFim(){const p=getPaciente();if(!p)return;if(!inicioRegistrado){mostrarFeedback('error','Atenção','Registre o Início antes do Fim.');return;}registrarEtapa(p.pront,p.nome,ETAPA_FIM,(ok,dh)=>{if(ok){mostrarFeedback('success',`Medicação Fim — ${dh}`,`Prontuário: ${p.pront} · ${p.nome}`);document.getElementById('m-pront').value='';document.getElementById('m-nome').value='';document.getElementById('paciente-lido').style.display='none';document.getElementById('btn-fim').style.display='none';dadosQR=null;inicioRegistrado=false;}else mostrarFeedback('error','Erro ao registrar',dh);esconder(8000);});}
</script>
</body>
</html>
