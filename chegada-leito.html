<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chegada no Leito — Heliópolis PA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
  :root {
    --blue-50:#E6F1FB; --blue-100:#B5D4F4; --blue-600:#185FA5; --blue-800:#0C447C; --blue-900:#042C53;
    --teal-50:#E1F5EE; --teal-600:#0F6E56; --teal-800:#085041;
    --coral-50:#FAECE7; --coral-600:#993C1D; --coral-800:#712B13;
    --gray-50:#F1EFE8; --gray-100:#D3D1C7; --gray-600:#5F5E5A; --gray-800:#444441; --gray-900:#2C2C2A;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'IBM Plex Sans',sans-serif; background:#f4f6f9; min-height:100vh; color:var(--gray-900); }
  nav { background:var(--blue-900); padding:0 2rem; display:flex; align-items:center; height:56px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.18); }
  .nav-brand { font-size:15px; font-weight:600; color:#fff; letter-spacing:.03em; }
  .nav-brand span { color:var(--blue-100); font-weight:400; }
  .screen { padding:2rem; max-width:680px; margin:0 auto; }
  .card { background:#fff; border-radius:12px; border:.5px solid #dde1e7; padding:1.5rem; margin-bottom:1.25rem; }
  .card-title { font-size:13px; font-weight:600; color:var(--gray-600); text-transform:uppercase; letter-spacing:.08em; margin-bottom:1.1rem; }
  label { display:block; font-size:13px; font-weight:500; color:var(--gray-600); margin-bottom:6px; margin-top:14px; }
  label:first-of-type { margin-top:0; }
  input[type="text"], input[type="number"] { width:100%; height:42px; border:1px solid #dde1e7; border-radius:8px; padding:0 14px; font-family:inherit; font-size:15px; color:var(--gray-900); background:#fafafa; transition:border-color .15s,box-shadow .15s; outline:none; }
  input:focus { border-color:var(--blue-600); box-shadow:0 0 0 3px rgba(24,95,165,.12); background:#fff; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:0 1.4rem; height:42px; border-radius:8px; font-family:inherit; font-size:14px; font-weight:500; cursor:pointer; border:none; transition:opacity .15s,transform .1s; }
  .btn:active { transform:scale(.98); }
  .btn-primary { background:var(--blue-600); color:#fff; }
  .btn-primary:hover { opacity:.88; }
  .btn-success { background:#185FA5; color:#fff; width:100%; height:52px; font-size:15px; border-radius:10px; margin-top:1rem; }
  .btn-success:hover { opacity:.88; }
  .btn-outline { background:none; border:1px solid #dde1e7; color:var(--gray-600); font-size:13px; height:36px; padding:0 1rem; }
  .btn-outline:hover { background:var(--gray-50); }
  .btn-full { width:100%; }
  .step-header { text-align:center; padding:1.5rem 0 1rem; }
  .step-badge { display:inline-flex; align-items:center; gap:8px; border-radius:100px; padding:6px 16px; font-size:14px; font-weight:500; margin-bottom:12px; }
  .step-title { font-size:24px; font-weight:600; color:var(--gray-900); margin-bottom:4px; }
  .step-subtitle { font-size:14px; color:var(--gray-600); }
  .scanner-area { position:relative; width:100%; aspect-ratio:1; max-width:320px; margin:0 auto; background:#000; border-radius:12px; overflow:hidden; }
  .scanner-area video { width:100%; height:100%; object-fit:cover; }
  .scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .scan-frame { width:200px; height:200px; border:2px solid rgba(255,255,255,.8); border-radius:12px; position:relative; }
  .scan-frame::before { content:''; position:absolute; top:-2px; left:-2px; width:30px; height:30px; border-top:3px solid #5CB3F0; border-left:3px solid #5CB3F0; border-radius:4px 0 0 0; }
  .scan-frame::after { content:''; position:absolute; bottom:-2px; right:-2px; width:30px; height:30px; border-bottom:3px solid #5CB3F0; border-right:3px solid #5CB3F0; border-radius:0 0 4px 0; }
  .scan-line { position:absolute; width:180px; height:2px; background:linear-gradient(90deg,transparent,#5CB3F0,transparent); animation:scanLine 2s ease-in-out infinite; }
  @keyframes scanLine { 0%{top:10px;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:190px;opacity:0} }
  .or-divider { display:flex; align-items:center; gap:12px; margin:1.25rem 0; color:var(--gray-600); font-size:13px; }
  .or-divider::before,.or-divider::after { content:''; flex:1; height:.5px; background:#dde1e7; }
  .feedback-box { display:none; border-radius:10px; padding:1.25rem 1.5rem; margin-top:1.25rem; animation:fadeUp .25s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .feedback-box.success { background:var(--teal-50); border:1px solid #9FE1CB; }
  .feedback-box.error { background:var(--coral-50); border:1px solid #F5C4B3; }
  .feedback-title { font-size:16px; font-weight:600; margin-bottom:4px; }
  .feedback-box.success .feedback-title { color:var(--teal-800); }
  .feedback-box.error .feedback-title { color:var(--coral-600); }
  .feedback-detail { font-size:13px; }
  .feedback-box.success .feedback-detail { color:var(--teal-600); }
  .feedback-box.error .feedback-detail { color:var(--coral-600); }
  @media(max-width:500px) { nav{padding:0 1rem;} .screen{padding:1rem;} }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">Heliópolis <span>/ Chegada no Leito</span></div>
</nav>
<div class="screen">
  <div class="step-header">
    <div class="step-badge" style="background:#E6F1FB;color:#0C447C;">
      <span style="width:8px;height:8px;border-radius:50%;background:#185FA5;display:inline-block;"></span>
      Posto de registro
    </div>
    <div class="step-title">Chegada no Leito</div>
    <div class="step-subtitle">Aproxime o celular do QR Code do paciente</div>
  </div>

  <div class="card">
    <div class="card-title">Leitura de QR Code</div>
    <div class="scanner-area">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame"><div class="scan-line"></div></div>
      </div>
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:1rem;" onclick="iniciarCamera()">Ativar câmera</button>
    <button class="btn btn-outline btn-full" style="margin-top:8px;" onclick="pararCamera()">Parar câmera</button>
  </div>

  <div class="or-divider">ou digitar manualmente</div>

  <div class="card">
    <label for="m-pront">Número do prontuário</label>
    <input type="number" id="m-pront" maxlength="7" oninput="this.value=this.value.slice(0,7)" placeholder="Ex: 1234567" min="1">
    <label for="m-nome">Nome do paciente</label>
    <input type="text" id="m-nome" placeholder="Ex: Maria Silva">
    <button class="btn btn-success" onclick="registrarManual()">Registrar horário — Chegada no Leito</button>
  </div>

  <div class="feedback-box" id="fb">
    <div class="feedback-title" id="fb-title"></div>
    <div class="feedback-detail" id="fb-detail"></div>
  </div>
</div>

<script>
const ETAPA = 'Chegada no Leito';
let scriptUrlCache = null;
function getScriptUrl() {
  if (scriptUrlCache) return scriptUrlCache;
  try { scriptUrlCache = localStorage.getItem('scriptUrl') || ''; } catch(e) { scriptUrlCache = ''; }
  return scriptUrlCache;
}
function formatarDataHora(date){
  const d=String(date.getDate()).padStart(2,'0'),m=String(date.getMonth()+1).padStart(2,'0'),a=date.getFullYear();
  const h=String(date.getHours()).padStart(2,'0'),min=String(date.getMinutes()).padStart(2,'0'),s=String(date.getSeconds()).padStart(2,'0');
  return d+'/'+m+'/'+a+' '+h+':'+min+':'+s;
}
function registrarEtapa(prontuario,nome,etapa,cb){
  const url=getScriptUrl(),dataHora=formatarDataHora(new Date());
  if(!url){if(cb)cb(false,'URL não configurada');return;}
  fetch(url+'?'+new URLSearchParams({prontuario,nome,etapa,dataHora}),{method:'GET',mode:'no-cors'})
    .then(()=>{if(cb)cb(true,dataHora);}).catch(e=>{if(cb)cb(false,String(e));});
}
function mostrarFeedback(tipo,titulo,detalhe){
  const fb=document.getElementById('fb');
  fb.className='feedback-box '+tipo;
  document.getElementById('fb-title').textContent=titulo;
  document.getElementById('fb-detail').textContent=detalhe;
  fb.style.display='block';
  fb.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function esconder(ms){setTimeout(()=>{document.getElementById('fb').style.display='none';},ms||7000);}
let stream=null,timer=null;
async function iniciarCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('video');v.srcObject=stream;v.play();scanQR();
  }catch(e){mostrarFeedback('error','Câmera indisponível','Permita o acesso à câmera nas configurações do navegador, ou use o campo manual abaixo.');}
}
function pararCamera(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  if(timer){clearInterval(timer);timer=null;}
}
function scanQR(){
  if(!('BarcodeDetector' in window)){mostrarFeedback('error','Scanner não suportado','Use o Chrome para Android ou use o campo manual abaixo.');return;}
  const detector=new BarcodeDetector({formats:['qr_code']});
  const video=document.getElementById('video');
  timer=setInterval(async()=>{
    if(!video.videoWidth)return;
    try{
      const codes=await detector.detect(video);
      if(codes.length>0){
        pararCamera();
        let data;try{data=JSON.parse(codes[0].rawValue);}catch(_){data={p:codes[0].rawValue,n:'—'};}
        enviar(String(data.p),data.n);
      }
    }catch(_){}
  },300);
}
function registrarManual(){
  const pront=document.getElementById('m-pront').value.trim();
  const nome=document.getElementById('m-nome').value.trim();
  if(!pront||isNaN(pront)||Number(pront)<=0||pront.length>7){mostrarFeedback('error','Prontuário inválido','O prontuário deve ter no máximo 7 dígitos.');return;}
  if(!nome){mostrarFeedback('error','Nome ausente','Informe o nome do paciente.');return;}
  enviar(pront,nome);
  document.getElementById('m-pront').value='';
  document.getElementById('m-nome').value='';
}
function enviar(pront,nome){
  registrarEtapa(pront,nome,ETAPA,(ok,dataHora)=>{
    if(ok) mostrarFeedback('success',ETAPA+' registrado — '+dataHora,'Prontuário: '+pront+' · '+nome);
    else   mostrarFeedback('error','Erro ao registrar',dataHora);
    esconder(7000);
  });
}
</script>
</body>
</html>
